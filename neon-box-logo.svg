<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 760" width="760" height="760">
  <defs>

    <!-- Box stroke gradient: cyan → purple → pink -->
    <linearGradient id="boxGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#00e5ff"/>
      <stop offset="50%"  stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>

    <!-- Wave gradient: cyan → purple → pink vertical -->
    <linearGradient id="waveGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%"   stop-color="#f472b6" stop-opacity="0.9"/>
      <stop offset="40%"  stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0.8"/>
    </linearGradient>

    <linearGradient id="waveGrad2" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%"   stop-color="#e879f9" stop-opacity="0.85"/>
      <stop offset="50%"  stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0.75"/>
    </linearGradient>

    <linearGradient id="waveGrad3" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%"   stop-color="#f9a8d4" stop-opacity="0.8"/>
      <stop offset="50%"  stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7dd3fc" stop-opacity="0.7"/>
    </linearGradient>

    <!-- Glow filter for box -->
    <filter id="boxGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Glow filter for waves -->
    <filter id="waveGlow" x="-40%" y="-10%" width="180%" height="120%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Soft glow for particles -->
    <filter id="particleGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

  </defs>

  <!-- ============================================================
       BOX BODY (isometric open box, outline only)
       Bottom face corners:  BL(175,680) BR(585,680) 
       Top rim corners:      TL(155,460) TR(605,460)
       The box front face:   TL→TR→BR→BL
       Left side panel angled inward slightly
       Right side panel angled inward slightly
  ============================================================ -->

  <g filter="url(#boxGlow)">

    <!-- Front face of box -->
    <path d="M 175,670 L 585,670 L 605,460 L 155,460 Z"
          fill="none"
          stroke="url(#boxGrad)"
          stroke-width="2.2"
          stroke-linejoin="round"/>

    <!-- Bottom edge connecting left-front to right-front (base) -->
    <!-- Left side panel: from TL-front to back-left corner -->
    <path d="M 155,460 L 240,415 L 240,620 L 175,670"
          fill="none"
          stroke="url(#boxGrad)"
          stroke-width="2.2"
          stroke-linejoin="round"/>

    <!-- Right side panel -->
    <path d="M 605,460 L 520,415 L 520,620 L 585,670"
          fill="none"
          stroke="url(#boxGrad)"
          stroke-width="2.2"
          stroke-linejoin="round"/>

    <!-- Back top edge (behind the opening) -->
    <path d="M 240,415 L 520,415"
          fill="none"
          stroke="url(#boxGrad)"
          stroke-width="2.2"/>

    <!-- ======================================================
         LID: two flaps forming an open box lid
         Left flap:  from TL-front(155,460) → center-top(380,400) → back-left(240,415)
         Right flap: from TR-front(605,460) → center-top(380,400) → back-right(520,415)
    ====================================================== -->

    <!-- Left lid flap -->
    <path d="M 155,460 L 380,400 L 240,415 Z"
          fill="none"
          stroke="url(#boxGrad)"
          stroke-width="2.2"
          stroke-linejoin="round"/>

    <!-- Right lid flap -->
    <path d="M 605,460 L 380,400 L 520,415 Z"
          fill="none"
          stroke="url(#boxGrad)"
          stroke-width="2.2"
          stroke-linejoin="round"/>

  </g>

  <!-- ============================================================
       MAGICAL ENERGY WAVES  (5 sinuous vertical paths)
       Originate from box center ~(380,460), rise to top of canvas
       Each wave sways left/right with elegant cubic bezier curves
  ============================================================ -->

  <g filter="url(#waveGlow)">

    <!-- Wave 1 – leftmost, cyan toned -->
    <path id="w1"
          d="M 355,460
             C 330,430 295,400 315,360
             C 335,320 360,300 340,255
             C 320,210 290,190 310,145
             C 330,100 350,80  335,40"
          fill="none"
          stroke="url(#waveGrad)"
          stroke-width="1.8"
          stroke-linecap="round">
      <animate attributeName="d"
               dur="3.4s"
               repeatCount="indefinite"
               calcMode="spline"
               keySplines="0.45 0 0.55 1; 0.45 0 0.55 1"
               values="
                 M 355,460 C 330,430 295,400 315,360 C 335,320 360,300 340,255 C 320,210 290,190 310,145 C 330,100 350,80 335,40;
                 M 355,460 C 340,425 300,395 325,352 C 350,309 368,292 345,248 C 322,204 298,182 315,138 C 332,94  348,74  330,35;
                 M 355,460 C 330,430 295,400 315,360 C 335,320 360,300 340,255 C 320,210 290,190 310,145 C 330,100 350,80 335,40"/>
    </path>

    <!-- Wave 2 – slightly right of center, purple -->
    <path id="w2"
          d="M 368,460
             C 395,425 420,390 400,345
             C 380,300 350,280 375,235
             C 400,190 425,170 405,120
             C 385,70  365,55  380,20"
          fill="none"
          stroke="url(#waveGrad2)"
          stroke-width="2"
          stroke-linecap="round">
      <animate attributeName="d"
               dur="4s"
               repeatCount="indefinite"
               calcMode="spline"
               keySplines="0.45 0 0.55 1; 0.45 0 0.55 1"
               values="
                 M 368,460 C 395,425 420,390 400,345 C 380,300 350,280 375,235 C 400,190 425,170 405,120 C 385,70 365,55 380,20;
                 M 368,460 C 390,420 418,383 396,340 C 374,297 348,274 370,230 C 392,186 420,164 398,115 C 376,66 362,50 375,16;
                 M 368,460 C 395,425 420,390 400,345 C 380,300 350,280 375,235 C 400,190 425,170 405,120 C 385,70 365,55 380,20"/>
    </path>

    <!-- Wave 3 – center, strongest, pink-purple -->
    <path id="w3"
          d="M 380,460
             C 355,420 330,385 355,340
             C 380,295 410,275 385,225
             C 360,175 330,158 355,108
             C 380,58  400,42  380,5"
          fill="none"
          stroke="url(#waveGrad)"
          stroke-width="2.2"
          stroke-linecap="round">
      <animate attributeName="d"
               dur="3.8s"
               repeatCount="indefinite"
               calcMode="spline"
               keySplines="0.45 0 0.55 1; 0.45 0 0.55 1"
               values="
                 M 380,460 C 355,420 330,385 355,340 C 380,295 410,275 385,225 C 360,175 330,158 355,108 C 380,58 400,42 380,5;
                 M 380,460 C 362,416 334,380 358,336 C 382,292 408,270 382,221 C 356,172 328,154 352,105 C 376,56 397,40 378,4;
                 M 380,460 C 355,420 330,385 355,340 C 380,295 410,275 385,225 C 360,175 330,158 355,108 C 380,58 400,42 380,5"/>
    </path>

    <!-- Wave 4 – right side, violet -->
    <path id="w4"
          d="M 392,460
             C 418,428 445,395 422,350
             C 399,305 370,288 396,242
             C 422,196 448,178 425,130
             C 402,82  382,65  400,28"
          fill="none"
          stroke="url(#waveGrad3)"
          stroke-width="1.8"
          stroke-linecap="round">
      <animate attributeName="d"
               dur="4.5s"
               repeatCount="indefinite"
               calcMode="spline"
               keySplines="0.45 0 0.55 1; 0.45 0 0.55 1"
               values="
                 M 392,460 C 418,428 445,395 422,350 C 399,305 370,288 396,242 C 422,196 448,178 425,130 C 402,82 382,65 400,28;
                 M 392,460 C 415,424 442,390 418,346 C 394,302 367,284 392,239 C 417,194 445,174 420,127 C 395,80 378,62 396,26;
                 M 392,460 C 418,428 445,395 422,350 C 399,305 370,288 396,242 C 422,196 448,178 425,130 C 402,82 382,65 400,28"/>
    </path>

    <!-- Wave 5 – far right, pink -->
    <path id="w5"
          d="M 408,460
             C 435,432 460,400 438,358
             C 416,316 388,298 412,252
             C 436,206 462,188 440,142
             C 418,96  398,80  415,42"
          fill="none"
          stroke="url(#waveGrad2)"
          stroke-width="1.6"
          stroke-linecap="round">
      <animate attributeName="d"
               dur="3.2s"
               repeatCount="indefinite"
               calcMode="spline"
               keySplines="0.45 0 0.55 1; 0.45 0 0.55 1"
               values="
                 M 408,460 C 435,432 460,400 438,358 C 416,316 388,298 412,252 C 436,206 462,188 440,142 C 418,96 398,80 415,42;
                 M 408,460 C 432,428 456,396 433,355 C 410,314 385,295 408,249 C 431,203 458,184 435,139 C 412,94 394,77 410,40;
                 M 408,460 C 435,432 460,400 438,358 C 416,316 388,298 412,252 C 436,206 462,188 440,142 C 418,96 398,80 415,42"/>
    </path>

  </g>

  <!-- ============================================================
       GLOWING PARTICLES
  ============================================================ -->

  <g filter="url(#particleGlow)">

    <!-- Scattered particles – various sizes, colors, positions around waves -->
    <!-- Each circle gets an opacity animation for twinkling -->

    <circle cx="290" cy="120" r="3.5" fill="#38bdf8">
      <animate attributeName="opacity" values="0.9;0.2;0.8;0.1;0.9" dur="2.1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="460" cy="95" r="2.5" fill="#a78bfa">
      <animate attributeName="opacity" values="0.4;1;0.3;0.9;0.4" dur="1.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="240" cy="200" r="2" fill="#f472b6">
      <animate attributeName="opacity" values="1;0.2;0.7;0.3;1" dur="2.6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="510" cy="180" r="3" fill="#818cf8">
      <animate attributeName="opacity" values="0.5;1;0.4;0.8;0.5" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="275" cy="290" r="2.5" fill="#22d3ee">
      <animate attributeName="opacity" values="0.8;0.2;1;0.4;0.8" dur="2.3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="490" cy="260" r="2" fill="#e879f9">
      <animate attributeName="opacity" values="0.3;0.9;0.2;1;0.3" dur="1.9s" repeatCount="indefinite"/>
    </circle>
    <circle cx="320" cy="160" r="1.8" fill="#7dd3fc">
      <animate attributeName="opacity" values="1;0.3;0.8;0.2;1" dur="2.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="445" cy="145" r="2.2" fill="#c084fc">
      <animate attributeName="opacity" values="0.6;1;0.3;0.7;0.6" dur="2.4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="220" cy="340" r="3" fill="#38bdf8">
      <animate attributeName="opacity" values="0.2;0.8;0.1;0.9;0.2" dur="3.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="540" cy="320" r="2.8" fill="#f9a8d4">
      <animate attributeName="opacity" values="0.9;0.3;0.7;0.2;0.9" dur="2.7s" repeatCount="indefinite"/>
    </circle>
    <circle cx="310" cy="70" r="2" fill="#a5f3fc">
      <animate attributeName="opacity" values="0.5;1;0.4;0.8;0.5" dur="1.6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="470" cy="58" r="1.5" fill="#d8b4fe">
      <animate attributeName="opacity" values="1;0.2;0.9;0.3;1" dur="2.9s" repeatCount="indefinite"/>
    </circle>
    <circle cx="560" cy="140" r="2" fill="#67e8f9">
      <animate attributeName="opacity" values="0.7;0.2;1;0.4;0.7" dur="2.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="200" cy="160" r="2.5" fill="#f0abfc">
      <animate attributeName="opacity" values="0.3;0.9;0.2;0.8;0.3" dur="3.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="580" cy="240" r="1.8" fill="#38bdf8">
      <animate attributeName="opacity" values="0.8;0.3;1;0.2;0.8" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="175" cy="250" r="3" fill="#818cf8">
      <animate attributeName="opacity" values="0.2;1;0.3;0.7;0.2" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="430" cy="210" r="1.5" fill="#f472b6">
      <animate attributeName="opacity" values="1;0.3;0.6;0.2;1" dur="3.1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="330" cy="230" r="2" fill="#a78bfa">
      <animate attributeName="opacity" values="0.5;1;0.4;0.9;0.5" dur="1.7s" repeatCount="indefinite"/>
    </circle>
    <circle cx="500" cy="360" r="2.2" fill="#22d3ee">
      <animate attributeName="opacity" values="0.3;0.8;0.2;1;0.3" dur="2.6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="255" cy="380" r="1.8" fill="#e879f9">
      <animate attributeName="opacity" values="0.9;0.2;0.7;0.3;0.9" dur="3.3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="345" cy="105" r="1.5" fill="#7dd3fc">
      <animate attributeName="opacity" values="0.4;1;0.3;0.8;0.4" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="420" cy="300" r="2.8" fill="#c084fc">
      <animate attributeName="opacity" values="0.8;0.2;0.9;0.3;0.8" dur="2.9s" repeatCount="indefinite"/>
    </circle>
    <circle cx="280" cy="170" r="2" fill="#f9a8d4">
      <animate attributeName="opacity" values="0.2;0.9;0.3;0.7;0.2" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="520" cy="80" r="2.5" fill="#38bdf8">
      <animate attributeName="opacity" values="0.7;0.3;1;0.2;0.7" dur="3.4s" repeatCount="indefinite"/>
    </circle>

  </g>

</svg>
