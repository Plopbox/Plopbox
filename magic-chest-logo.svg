<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 600" width="500" height="600">
  <defs>
    <!-- Gradient definitions -->
    <linearGradient id="chestGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00c6ff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#7b5ea7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff5dcd;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="waveGrad1" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#cc5dff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00c6ff;stop-opacity:0.7" />
    </linearGradient>
    <linearGradient id="waveGrad2" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#ff5dcd;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5b9fff;stop-opacity:0.6" />
    </linearGradient>
    <linearGradient id="waveGrad3" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#38bdf8;stop-opacity:0.5" />
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00c6ff;stop-opacity:0.3" />
      <stop offset="50%" style="stop-color:#cc5dff;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#ff5dcd;stop-opacity:0.3" />
    </linearGradient>
    <!-- Glow filter -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="innerGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- ===================== ANIMATED MAGIC WAVES ===================== -->
  <g id="magic-waves" filter="url(#softGlow)">

    <!-- Wave 1 - leftmost, blue -->
    <path id="wave1" d="M210,320 C200,290 220,260 205,230 C190,200 210,170 195,140 C180,110 200,85 190,60" 
          fill="none" stroke="url(#waveGrad1)" stroke-width="2.5" stroke-linecap="round" opacity="0.9">
      <animate attributeName="d" dur="3s" repeatCount="indefinite"
        values="
          M210,320 C200,290 220,260 205,230 C190,200 210,170 195,140 C180,110 200,85 190,60;
          M210,320 C215,290 195,260 210,230 C225,200 205,170 218,140 C231,110 210,85 222,60;
          M210,320 C200,290 220,260 205,230 C190,200 210,170 195,140 C180,110 200,85 190,60"
        calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"/>
      <animate attributeName="opacity" dur="3s" repeatCount="indefinite"
        values="0.9;0.6;0.9" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"/>
    </path>

    <!-- Wave 2 - center-left, purple -->
    <path id="wave2" d="M232,325 C225,295 245,265 232,235 C219,205 238,175 228,145 C218,115 235,88 228,58"
          fill="none" stroke="url(#waveGrad3)" stroke-width="3" stroke-linecap="round" opacity="0.85">
      <animate attributeName="d" dur="3.5s" repeatCount="indefinite"
        values="
          M232,325 C225,295 245,265 232,235 C219,205 238,175 228,145 C218,115 235,88 228,58;
          M232,325 C240,295 220,265 235,235 C250,205 230,175 242,145 C254,115 237,88 246,58;
          M232,325 C225,295 245,265 232,235 C219,205 238,175 228,145 C218,115 235,88 228,58"
        calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"/>
      <animate attributeName="opacity" dur="3.5s" repeatCount="indefinite"
        values="0.85;0.55;0.85" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"/>
    </path>

    <!-- Wave 3 - center, cyan-blue -->
    <path id="wave3" d="M252,322 C258,292 238,262 252,232 C266,202 248,172 260,142 C272,112 252,86 262,55"
          fill="none" stroke="url(#waveGrad1)" stroke-width="2.8" stroke-linecap="round" opacity="0.9">
      <animate attributeName="d" dur="4s" repeatCount="indefinite"
        values="
          M252,322 C258,292 238,262 252,232 C266,202 248,172 260,142 C272,112 252,86 262,55;
          M252,322 C245,292 265,262 250,232 C235,202 255,172 242,142 C229,112 250,86 240,55;
          M252,322 C258,292 238,262 252,232 C266,202 248,172 260,142 C272,112 252,86 262,55"
        calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"/>
      <animate attributeName="opacity" dur="4s" repeatCount="indefinite"
        values="0.9;0.6;0.9" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"/>
    </path>

    <!-- Wave 4 - center-right, pink-purple -->
    <path id="wave4" d="M272,325 C280,295 260,265 275,235 C290,205 272,178 282,148 C292,118 275,92 285,62"
          fill="none" stroke="url(#waveGrad2)" stroke-width="2.5" stroke-linecap="round" opacity="0.85">
      <animate attributeName="d" dur="3.2s" repeatCount="indefinite"
        values="
          M272,325 C280,295 260,265 275,235 C290,205 272,178 282,148 C292,118 275,92 285,62;
          M272,325 C264,295 284,265 270,235 C256,205 274,178 263,148 C252,118 270,92 260,62;
          M272,325 C280,295 260,265 275,235 C290,205 272,178 282,148 C292,118 275,92 285,62"
        calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"/>
      <animate attributeName="opacity" dur="3.2s" repeatCount="indefinite"
        values="0.85;0.5;0.85" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"/>
    </path>

    <!-- Wave 5 - rightmost, blue -->
    <path id="wave5" d="M292,320 C300,290 282,260 295,230 C308,200 290,172 302,142 C314,112 296,88 308,60"
          fill="none" stroke="url(#waveGrad3)" stroke-width="2.2" stroke-linecap="round" opacity="0.8">
      <animate attributeName="d" dur="3.8s" repeatCount="indefinite"
        values="
          M292,320 C300,290 282,260 295,230 C308,200 290,172 302,142 C314,112 296,88 308,60;
          M292,320 C284,290 302,260 288,230 C274,200 292,172 280,142 C268,112 286,88 274,60;
          M292,320 C300,290 282,260 295,230 C308,200 290,172 302,142 C314,112 296,88 308,60"
        calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"/>
      <animate attributeName="opacity" dur="3.8s" repeatCount="indefinite"
        values="0.8;0.5;0.8" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"/>
    </path>
  </g>

  <!-- ===================== FLOATING PARTICLES ===================== -->
  <g id="particles">
    <!-- Left side particles -->
    <circle cx="155" cy="180" r="4" fill="#5b9fff" opacity="0">
      <animate attributeName="opacity" dur="2.5s" repeatCount="indefinite" begin="0s"
        values="0;0.8;0" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"/>
      <animate attributeName="cy" dur="2.5s" repeatCount="indefinite" begin="0s"
        values="180;140;100" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"/>
    </circle>
    <circle cx="175" cy="220" r="3" fill="#a855f7" opacity="0">
      <animate attributeName="opacity" dur="3s" repeatCount="indefinite" begin="0.4s"
        values="0;0.7;0" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"/>
      <animate attributeName="cy" dur="3s" repeatCount="indefinite" begin="0.4s"
        values="220;170;120" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"/>
    </circle>
    <circle cx="140" cy="150" r="5" fill="#38bdf8" opacity="0">
      <animate attributeName="opacity" dur="3.5s" repeatCount="indefinite" begin="0.8s"
        values="0;0.6;0" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"/>
      <animate attributeName="cy" dur="3.5s" repeatCount="indefinite" begin="0.8s"
        values="150;100;60" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"/>
    </circle>
    <circle cx="165" cy="260" r="2.5" fill="#7c3aed" opacity="0">
      <animate attributeName="opacity" dur="2.8s" repeatCount="indefinite" begin="1.2s"
        values="0;0.9;0" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"/>
      <animate attributeName="cy" dur="2.8s" repeatCount="indefinite" begin="1.2s"
        values="260;210;160" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"/>
    </circle>
    <circle cx="185" cy="130" r="3.5" fill="#00c6ff" opacity="0">
      <animate attributeName="opacity" dur="4s" repeatCount="indefinite" begin="0.6s"
        values="0;0.7;0" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"/>
      <animate attributeName="cy" dur="4s" repeatCount="indefinite" begin="0.6s"
        values="130;80;30" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"/>
    </circle>
    <circle cx="200" cy="95" r="2" fill="#a855f7" opacity="0">
      <animate attributeName="opacity" dur="2.2s" repeatCount="indefinite" begin="1.5s"
        values="0;0.8;0" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"/>
      <animate attributeName="cy" dur="2.2s" repeatCount="indefinite" begin="1.5s"
        values="95;60;25" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"/>
    </circle>

    <!-- Right side particles -->
    <circle cx="345" cy="175" r="4" fill="#a855f7" opacity="0">
      <animate attributeName="opacity" dur="2.7s" repeatCount="indefinite" begin="0.3s"
        values="0;0.8;0" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"/>
      <animate attributeName="cy" dur="2.7s" repeatCount="indefinite" begin="0.3s"
        values="175;130;90" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"/>
    </circle>
    <circle cx="325" cy="225" r="3" fill="#5b9fff" opacity="0">
      <animate attributeName="opacity" dur="3.2s" repeatCount="indefinite" begin="0.9s"
        values="0;0.7;0" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"/>
      <animate attributeName="cy" dur="3.2s" repeatCount="indefinite" begin="0.9s"
        values="225;175;130" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"/>
    </circle>
    <circle cx="360" cy="145" r="5" fill="#ff5dcd" opacity="0">
      <animate attributeName="opacity" dur="3.8s" repeatCount="indefinite" begin="0.5s"
        values="0;0.6;0" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"/>
      <animate attributeName="cy" dur="3.8s" repeatCount="indefinite" begin="0.5s"
        values="145;95;55" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"/>
    </circle>
    <circle cx="335" cy="260" r="2.5" fill="#7c3aed" opacity="0">
      <animate attributeName="opacity" dur="2.9s" repeatCount="indefinite" begin="1.4s"
        values="0;0.9;0" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"/>
      <animate attributeName="cy" dur="2.9s" repeatCount="indefinite" begin="1.4s"
        values="260;205;155" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"/>
    </circle>
    <circle cx="315" cy="130" r="3.5" fill="#38bdf8" opacity="0">
      <animate attributeName="opacity" dur="4.2s" repeatCount="indefinite" begin="0.2s"
        values="0;0.7;0" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"/>
      <animate attributeName="cy" dur="4.2s" repeatCount="indefinite" begin="0.2s"
        values="130;80;30" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"/>
    </circle>
    <circle cx="300" cy="95" r="2" fill="#ff5dcd" opacity="0">
      <animate attributeName="opacity" dur="2.4s" repeatCount="indefinite" begin="1.8s"
        values="0;0.8;0" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"/>
      <animate attributeName="cy" dur="2.4s" repeatCount="indefinite" begin="1.8s"
        values="95;55;20" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"/>
    </circle>

    <!-- Top scattered particles -->
    <circle cx="230" cy="80" r="2.5" fill="#00c6ff" opacity="0">
      <animate attributeName="opacity" dur="2s" repeatCount="indefinite" begin="0.7s"
        values="0;1;0"/>
      <animate attributeName="cy" dur="2s" repeatCount="indefinite" begin="0.7s"
        values="80;50;20"/>
    </circle>
    <circle cx="270" cy="75" r="3" fill="#a855f7" opacity="0">
      <animate attributeName="opacity" dur="2.6s" repeatCount="indefinite" begin="1.1s"
        values="0;1;0"/>
      <animate attributeName="cy" dur="2.6s" repeatCount="indefinite" begin="1.1s"
        values="75;45;15"/>
    </circle>
    <circle cx="252" cy="65" r="2" fill="#ff5dcd" opacity="0">
      <animate attributeName="opacity" dur="3s" repeatCount="indefinite" begin="0.3s"
        values="0;0.9;0"/>
      <animate attributeName="cy" dur="3s" repeatCount="indefinite" begin="0.3s"
        values="65;35;10"/>
    </circle>
  </g>

  <!-- ===================== MAGIC GLOW AT BASE ===================== -->
  <ellipse cx="252" cy="328" rx="55" ry="12" fill="url(#glowGrad)" opacity="0.5" filter="url(#innerGlow)">
    <animate attributeName="opacity" dur="2.5s" repeatCount="indefinite"
      values="0.3;0.7;0.3" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"/>
    <animate attributeName="rx" dur="2.5s" repeatCount="indefinite"
      values="55;65;55" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"/>
  </ellipse>

  <!-- ===================== TREASURE CHEST ===================== -->
  <g id="chest" filter="url(#glow)" stroke="url(#chestGrad)" stroke-linecap="round" stroke-linejoin="round" fill="none">

    <!-- === LID (open, tilted back) === -->
    <!-- Lid top face -->
    <path d="M148,318 C148,300 148,290 148,285 C148,270 162,262 180,258 L252,248 L324,258 C342,262 356,270 356,285 C356,290 356,300 356,318" 
          stroke-width="2.8"/>
    <!-- Lid curved top -->
    <path d="M148,285 C148,270 162,258 180,252 L252,242 L324,252 C342,258 356,270 356,285" 
          stroke-width="2.8"/>
    <!-- Lid back arc -->
    <path d="M180,252 C180,240 200,232 252,230 C304,232 324,240 324,252" 
          stroke-width="2.5"/>
    <!-- Lid hinge area -->
    <path d="M148,318 L356,318" stroke-width="2.5"/>

    <!-- Lid reinforcement bands -->
    <line x1="148" y1="295" x2="356" y2="295" stroke-width="1.8"/>
    <!-- Left lid band -->
    <line x1="185" y1="252" x2="175" y2="318" stroke-width="1.8"/>
    <!-- Right lid band -->
    <line x1="319" y1="252" x2="329" y2="318" stroke-width="1.8"/>
    <!-- Center lid band -->
    <line x1="252" y1="242" x2="252" y2="318" stroke-width="1.8"/>

    <!-- Lid corner reinforcements -->
    <rect x="142" y="280" width="14" height="14" rx="2" stroke-width="1.8"/>
    <rect x="348" y="280" width="14" height="14" rx="2" stroke-width="1.8"/>
    <rect x="145" y="308" width="14" height="14" rx="2" stroke-width="1.8"/>
    <rect x="345" y="308" width="14" height="14" rx="2" stroke-width="1.8"/>

    <!-- Lid rivet dots -->
    <circle cx="158" cy="270" r="2.5" stroke-width="1.5" fill="#7b5ea7" opacity="0.5"/>
    <circle cx="185" cy="265" r="2.5" stroke-width="1.5" fill="#7b5ea7" opacity="0.5"/>
    <circle cx="252" cy="260" r="2.5" stroke-width="1.5" fill="#7b5ea7" opacity="0.5"/>
    <circle cx="319" cy="265" r="2.5" stroke-width="1.5" fill="#7b5ea7" opacity="0.5"/>
    <circle cx="346" cy="270" r="2.5" stroke-width="1.5" fill="#7b5ea7" opacity="0.5"/>

    <!-- Lock on lid -->
    <circle cx="252" cy="244" r="7" stroke-width="2.5"/>
    <rect x="246" y="244" width="12" height="9" rx="2" stroke-width="2"/>

    <!-- === BOX BODY === -->
    <!-- Front face -->
    <rect x="148" y="318" width="208" height="155" rx="3" stroke-width="2.8"/>
    <!-- Right side face (perspective) -->
    <path d="M356,318 L390,338 L390,473 L356,473" stroke-width="2.5"/>
    <line x1="390" y1="338" x2="390" y2="473" stroke-width="2.5"/>
    <!-- Bottom perspective line -->
    <path d="M148,473 L182,493 L390,493 L390,473" stroke-width="2.5"/>

    <!-- Front horizontal bands -->
    <line x1="148" y1="353" x2="356" y2="353" stroke-width="2"/>
    <line x1="148" y1="440" x2="356" y2="440" stroke-width="2"/>

    <!-- Front vertical bands -->
    <line x1="197" y1="318" x2="197" y2="473" stroke-width="2"/>
    <line x1="307" y1="318" x2="307" y2="473" stroke-width="2"/>

    <!-- Right side bands -->
    <line x1="356" y1="353" x2="390" y2="368" stroke-width="1.8"/>
    <line x1="356" y1="440" x2="390" y2="455" stroke-width="1.8"/>
    <line x1="373" y1="338" x2="373" y2="473" stroke-width="1.8"/>

    <!-- Corner reinforcement plates front -->
    <rect x="142" y="312" width="16" height="16" rx="2" stroke-width="2"/>
    <rect x="346" y="312" width="16" height="16" rx="2" stroke-width="2"/>
    <rect x="142" y="434" width="16" height="16" rx="2" stroke-width="2"/>
    <rect x="346" y="434" width="16" height="16" rx="2" stroke-width="2"/>
    <rect x="142" y="466" width="16" height="16" rx="2" stroke-width="2"/>
    <rect x="346" y="466" width="16" height="16" rx="2" stroke-width="2"/>

    <!-- Corner reinforcement plates right side -->
    <rect x="382" y="330" width="16" height="16" rx="2" stroke-width="2"/>
    <rect x="382" y="434" width="16" height="16" rx="2" stroke-width="2"/>
    <rect x="382" y="466" width="16" height="16" rx="2" stroke-width="2"/>

    <!-- Front rivets -->
    <circle cx="163" cy="335" r="3" fill="#7b5ea7" opacity="0.6"/>
    <circle cx="182" cy="335" r="3" fill="#7b5ea7" opacity="0.6"/>
    <circle cx="322" cy="335" r="3" fill="#7b5ea7" opacity="0.6"/>
    <circle cx="341" cy="335" r="3" fill="#7b5ea7" opacity="0.6"/>
    <circle cx="163" cy="458" r="3" fill="#7b5ea7" opacity="0.6"/>
    <circle cx="182" cy="458" r="3" fill="#7b5ea7" opacity="0.6"/>
    <circle cx="322" cy="458" r="3" fill="#7b5ea7" opacity="0.6"/>
    <circle cx="341" cy="458" r="3" fill="#7b5ea7" opacity="0.6"/>

    <!-- Center lock clasp on front -->
    <rect x="234" y="386" width="36" height="30" rx="4" stroke-width="2.5"/>
    <!-- Shield emblem inside clasp -->
    <path d="M252,392 L260,396 L260,406 C260,410 256,413 252,415 C248,413 244,410 244,406 L244,396 Z" stroke-width="1.8"/>

    <!-- Wood grain lines on front panels -->
    <line x1="210" y1="360" x2="232" y2="385" stroke-width="0.8" opacity="0.4"/>
    <line x1="215" y1="360" x2="237" y2="385" stroke-width="0.8" opacity="0.4"/>
    <line x1="270" y1="360" x2="292" y2="385" stroke-width="0.8" opacity="0.4"/>
    <line x1="275" y1="360" x2="297" y2="385" stroke-width="0.8" opacity="0.4"/>
    <line x1="165" y1="395" x2="188" y2="435" stroke-width="0.8" opacity="0.4"/>
    <line x1="315" y1="395" x2="338" y2="435" stroke-width="0.8" opacity="0.4"/>

    <!-- Bottom face perspective -->
    <path d="M182,493 L182,488 L148,468 L148,473" stroke-width="2.2"/>

  </g>

  <!-- ===================== CHEST PULSE GLOW ===================== -->
  <rect x="148" y="318" width="208" height="155" rx="3" fill="none" 
        stroke="url(#chestGrad)" stroke-width="1" opacity="0">
    <animate attributeName="opacity" dur="3s" repeatCount="indefinite"
      values="0;0.4;0" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"/>
    <animate attributeName="stroke-width" dur="3s" repeatCount="indefinite"
      values="1;8;1" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"/>
  </rect>

</svg>
