<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>

    <!-- Background glow -->
    <radialGradient id="bgGlow" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#101426"/>
      <stop offset="100%" stop-color="#02030a"/>
    </radialGradient>

    <!-- Box outline gradient -->
    <linearGradient id="boxGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d8ff"/>
      <stop offset="50%" stop-color="#7b5cff"/>
      <stop offset="100%" stop-color="#ff3fbf"/>
    </linearGradient>

    <!-- Wave gradients (bottom to top so origin is vivid) -->
    <linearGradient id="waveA" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#ff3fbf"/>
      <stop offset="100%" stop-color="#34d8ff" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="waveB" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#7b5cff"/>
      <stop offset="100%" stop-color="#34d8ff" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="waveC" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#cc44ff"/>
      <stop offset="100%" stop-color="#34d8ff" stop-opacity="0.2"/>
    </linearGradient>

    <!-- Inner glow pool -->
    <radialGradient id="poolGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#9955ff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#9955ff" stop-opacity="0"/>
    </radialGradient>

    <!-- Particle gradient -->
    <linearGradient id="partGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d8ff"/>
      <stop offset="100%" stop-color="#ff3fbf"/>
    </linearGradient>

    <!-- Wave soft glow -->
    <filter id="waveGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Box edge glow -->
    <filter id="boxGlow" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Dot glow -->
    <filter id="dotGlow" x="-150%" y="-150%" width="400%" height="400%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

  </defs>

  <!-- ░░ BACKGROUND ░░ -->
  <rect width="512" height="512" fill="url(#bgGlow)"/>

  <!-- ░░ GLOW POOL (inside open box) ░░ -->
  <ellipse cx="256" cy="310" rx="60" ry="14" fill="url(#poolGrad)">
    <animate attributeName="rx" dur="2.6s" repeatCount="indefinite" calcMode="spline"
             keySplines="0.4 0 0.6 1;0.4 0 0.6 1" values="60;80;60"/>
    <animate attributeName="opacity" dur="2.6s" repeatCount="indefinite" calcMode="spline"
             keySplines="0.4 0 0.6 1;0.4 0 0.6 1" values="0.6;1;0.6"/>
  </ellipse>

  <!-- ░░ MAGIC WAVES ░░ -->
  <g filter="url(#waveGlow)" fill="none" stroke-linecap="round">

    <!-- Wave 1 – far left -->
    <path stroke="url(#waveA)" stroke-width="2.5"
          d="M228,278 C214,248 220,222 210,200 C200,178 188,168 184,150 C180,132 188,118 180,102">
      <animate attributeName="d" dur="3.4s" repeatCount="indefinite" calcMode="spline"
               keySplines="0.4 0 0.6 1;0.4 0 0.6 1"
               values="M228,278 C214,248 220,222 210,200 C200,178 188,168 184,150 C180,132 188,118 180,102;
                       M228,278 C242,248 236,222 246,200 C256,178 242,168 248,150 C254,132 244,118 252,102;
                       M228,278 C214,248 220,222 210,200 C200,178 188,168 184,150 C180,132 188,118 180,102"/>
      <animate attributeName="opacity" dur="3.4s" repeatCount="indefinite" calcMode="spline"
               keySplines="0.4 0 0.6 1;0.4 0 0.6 1" values="0.85;0.45;0.85"/>
    </path>

    <!-- Wave 2 – left of center -->
    <path stroke="url(#waveB)" stroke-width="3"
          d="M242,276 C232,246 240,220 232,198 C224,176 212,166 210,148 C208,130 216,116 210,100">
      <animate attributeName="d" dur="4s" repeatCount="indefinite" calcMode="spline"
               keySplines="0.4 0 0.6 1;0.4 0 0.6 1"
               values="M242,276 C232,246 240,220 232,198 C224,176 212,166 210,148 C208,130 216,116 210,100;
                       M242,276 C254,246 246,220 256,198 C266,176 254,166 258,148 C262,130 252,116 260,100;
                       M242,276 C232,246 240,220 232,198 C224,176 212,166 210,148 C208,130 216,116 210,100"/>
      <animate attributeName="opacity" dur="4s" repeatCount="indefinite" calcMode="spline"
               keySplines="0.4 0 0.6 1;0.4 0 0.6 1" values="0.9;0.5;0.9"/>
    </path>

    <!-- Wave 3 – center -->
    <path stroke="url(#waveC)" stroke-width="3.5"
          d="M256,274 C266,244 258,218 264,196 C270,174 280,164 282,146 C284,128 276,114 282,98">
      <animate attributeName="d" dur="3s" repeatCount="indefinite" calcMode="spline"
               keySplines="0.4 0 0.6 1;0.4 0 0.6 1"
               values="M256,274 C266,244 258,218 264,196 C270,174 280,164 282,146 C284,128 276,114 282,98;
                       M256,274 C244,244 252,218 246,196 C240,174 228,164 226,146 C224,128 234,114 226,98;
                       M256,274 C266,244 258,218 264,196 C270,174 280,164 282,146 C284,128 276,114 282,98"/>
      <animate attributeName="opacity" dur="3s" repeatCount="indefinite" calcMode="spline"
               keySplines="0.4 0 0.6 1;0.4 0 0.6 1" values="0.95;0.55;0.95"/>
    </path>

    <!-- Wave 4 – right of center -->
    <path stroke="url(#waveA)" stroke-width="3"
          d="M270,276 C280,246 274,220 282,198 C290,176 302,166 304,148 C306,130 298,116 304,100">
      <animate attributeName="d" dur="3.7s" repeatCount="indefinite" calcMode="spline"
               keySplines="0.4 0 0.6 1;0.4 0 0.6 1"
               values="M270,276 C280,246 274,220 282,198 C290,176 302,166 304,148 C306,130 298,116 304,100;
                       M270,276 C258,246 264,220 256,198 C248,176 236,166 234,148 C232,130 242,116 234,100;
                       M270,276 C280,246 274,220 282,198 C290,176 302,166 304,148 C306,130 298,116 304,100"/>
      <animate attributeName="opacity" dur="3.7s" repeatCount="indefinite" calcMode="spline"
               keySplines="0.4 0 0.6 1;0.4 0 0.6 1" values="0.9;0.5;0.9"/>
    </path>

    <!-- Wave 5 – far right -->
    <path stroke="url(#waveB)" stroke-width="2.5"
          d="M284,278 C296,248 292,222 302,200 C312,178 324,168 328,150 C332,132 324,118 332,102">
      <animate attributeName="d" dur="4.4s" repeatCount="indefinite" calcMode="spline"
               keySplines="0.4 0 0.6 1;0.4 0 0.6 1"
               values="M284,278 C296,248 292,222 302,200 C312,178 324,168 328,150 C332,132 324,118 332,102;
                       M284,278 C272,248 276,222 266,200 C256,178 244,168 240,150 C236,132 246,118 238,102;
                       M284,278 C296,248 292,222 302,200 C312,178 324,168 328,150 C332,132 324,118 332,102"/>
      <animate attributeName="opacity" dur="4.4s" repeatCount="indefinite" calcMode="spline"
               keySplines="0.4 0 0.6 1;0.4 0 0.6 1" values="0.85;0.45;0.85"/>
    </path>

  </g>

  <!-- ░░ FLOATING PARTICLES ░░ -->
  <g filter="url(#dotGlow)">

    <circle cx="210" cy="235" r="3.5" fill="#34d8ff" opacity="0">
      <animate attributeName="opacity" dur="2.8s" begin="0s"   repeatCount="indefinite" values="0;1;0"/>
      <animate attributeName="cy"      dur="2.8s" begin="0s"   repeatCount="indefinite" values="235;185;135"/>
    </circle>
    <circle cx="188" cy="210" r="2.8" fill="#7b5cff" opacity="0">
      <animate attributeName="opacity" dur="3.2s" begin="0.4s" repeatCount="indefinite" values="0;0.9;0"/>
      <animate attributeName="cy"      dur="3.2s" begin="0.4s" repeatCount="indefinite" values="210;155;100"/>
    </circle>
    <circle cx="172" cy="180" r="4"   fill="#34d8ff" opacity="0">
      <animate attributeName="opacity" dur="3.6s" begin="0.9s" repeatCount="indefinite" values="0;0.8;0"/>
      <animate attributeName="cy"      dur="3.6s" begin="0.9s" repeatCount="indefinite" values="180;120;65"/>
    </circle>
    <circle cx="196" cy="155" r="2.5" fill="#cc44ff" opacity="0">
      <animate attributeName="opacity" dur="2.4s" begin="1.4s" repeatCount="indefinite" values="0;1;0"/>
      <animate attributeName="cy"      dur="2.4s" begin="1.4s" repeatCount="indefinite" values="155;112;70"/>
    </circle>
    <circle cx="222" cy="128" r="3"   fill="#ff3fbf" opacity="0">
      <animate attributeName="opacity" dur="2s"   begin="0.7s" repeatCount="indefinite" values="0;0.9;0"/>
      <animate attributeName="cy"      dur="2s"   begin="0.7s" repeatCount="indefinite" values="128;88;48"/>
    </circle>

    <circle cx="302" cy="238" r="3.5" fill="#ff3fbf" opacity="0">
      <animate attributeName="opacity" dur="3s"   begin="0.2s" repeatCount="indefinite" values="0;1;0"/>
      <animate attributeName="cy"      dur="3s"   begin="0.2s" repeatCount="indefinite" values="238;185;132"/>
    </circle>
    <circle cx="324" cy="212" r="2.8" fill="#7b5cff" opacity="0">
      <animate attributeName="opacity" dur="3.4s" begin="0.8s" repeatCount="indefinite" values="0;0.9;0"/>
      <animate attributeName="cy"      dur="3.4s" begin="0.8s" repeatCount="indefinite" values="212;155;98"/>
    </circle>
    <circle cx="340" cy="182" r="4"   fill="#cc44ff" opacity="0">
      <animate attributeName="opacity" dur="3.8s" begin="0.3s" repeatCount="indefinite" values="0;0.8;0"/>
      <animate attributeName="cy"      dur="3.8s" begin="0.3s" repeatCount="indefinite" values="182;122;65"/>
    </circle>
    <circle cx="316" cy="156" r="2.5" fill="#34d8ff" opacity="0">
      <animate attributeName="opacity" dur="2.6s" begin="1.2s" repeatCount="indefinite" values="0;1;0"/>
      <animate attributeName="cy"      dur="2.6s" begin="1.2s" repeatCount="indefinite" values="156;112;68"/>
    </circle>
    <circle cx="290" cy="130" r="3"   fill="#ff3fbf" opacity="0">
      <animate attributeName="opacity" dur="2.2s" begin="1.7s" repeatCount="indefinite" values="0;0.9;0"/>
      <animate attributeName="cy"      dur="2.2s" begin="1.7s" repeatCount="indefinite" values="130;88;46"/>
    </circle>

    <circle cx="244" cy="115" r="2.5" fill="#34d8ff" opacity="0">
      <animate attributeName="opacity" dur="2.1s" begin="0.5s" repeatCount="indefinite" values="0;1;0"/>
      <animate attributeName="cy"      dur="2.1s" begin="0.5s" repeatCount="indefinite" values="115;80;45"/>
    </circle>
    <circle cx="268" cy="108" r="3"   fill="#cc44ff" opacity="0">
      <animate attributeName="opacity" dur="2.5s" begin="1.0s" repeatCount="indefinite" values="0;1;0"/>
      <animate attributeName="cy"      dur="2.5s" begin="1.0s" repeatCount="indefinite" values="108;72;36"/>
    </circle>
    <circle cx="256" cy="94"  r="2"   fill="#ff3fbf" opacity="0">
      <animate attributeName="opacity" dur="3s"   begin="0.3s" repeatCount="indefinite" values="0;0.9;0"/>
      <animate attributeName="cy"      dur="3s"   begin="0.3s" repeatCount="indefinite" values="94;60;26"/>
    </circle>

  </g>

  <!-- ░░ BOX ░░ -->
  <g fill="none" stroke="url(#boxGradient)" stroke-width="5.5"
     stroke-linejoin="round" stroke-linecap="round" filter="url(#boxGlow)">

    <!-- Left side face -->
    <polygon points="160,320 192,410 152,360 120,270"/>
    <!-- Right side face -->
    <polygon points="352,320 392,270 360,360 320,410"/>
    <!-- Front face -->
    <polygon points="160,320 352,320 320,410 192,410"/>
    <!-- Lid -->
    <polygon points="160,320 256,230 392,270 352,320"/>

    <!-- Front horizontal rib -->
    <line x1="164" y1="355" x2="348" y2="355" stroke-width="3"/>
    <!-- Front vertical ribs -->
    <line x1="202" y1="320" x2="196" y2="410" stroke-width="3"/>
    <line x1="310" y1="320" x2="316" y2="410" stroke-width="3"/>

    <!-- Corner caps -->
    <rect x="154" y="314" width="13" height="13" rx="2" stroke-width="2.5"/>
    <rect x="345" y="314" width="13" height="13" rx="2" stroke-width="2.5"/>
    <rect x="156" y="403" width="13" height="13" rx="2" stroke-width="2.5"/>
    <rect x="345" y="403" width="13" height="13" rx="2" stroke-width="2.5"/>
    <rect x="192" y="403" width="13" height="13" rx="2" stroke-width="2.5"/>
    <rect x="307" y="403" width="13" height="13" rx="2" stroke-width="2.5"/>

    <!-- Front clasp -->
    <rect x="238" y="355" width="36" height="26" rx="4" stroke-width="3"/>
    <path d="M256,359 L263,363 L263,372 C263,376 260,378 256,380 C252,378 249,376 249,372 L249,363 Z"
          stroke-width="2"/>

    <!-- Lid edge lines -->
    <line x1="256" y1="230" x2="216" y2="212" stroke-width="3" opacity="0.7"/>
    <line x1="256" y1="230" x2="296" y2="216" stroke-width="3" opacity="0.7"/>
  </g>

  <!-- Box front face pulse -->
  <polygon points="160,320 352,320 320,410 192,410"
           fill="none" stroke="url(#boxGradient)" stroke-width="1" opacity="0">
    <animate attributeName="opacity"      dur="3s" repeatCount="indefinite" calcMode="spline"
             keySplines="0.4 0 0.6 1;0.4 0 0.6 1" values="0;0.45;0"/>
    <animate attributeName="stroke-width" dur="3s" repeatCount="indefinite" calcMode="spline"
             keySplines="0.4 0 0.6 1;0.4 0 0.6 1" values="1;12;1"/>
  </polygon>

</svg>
